<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Swiss House — Rezervasyon Talebi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary:#C8102E;
  --cream:#f7f8fa; --parchment:#f0f2f5; --border:#e2e6eb; --warm:#b0b8c4;
  --gold:#9a7c3f; --gold2:#c4a55a; --dark:#1a1d23;
  --text:#1a1d23; --muted:#6b7280; --white:#fff;
  --green:#16a34a; --green-bg:#f0fdf4;
  --red:#dc2626; --red-bg:#fef2f2;
  --shadow:0 1px 8px rgba(0,0,0,.07);
  --shadow-lg:0 4px 24px rgba(0,0,0,.11);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--cream);color:var(--text);font-family:'Jost',sans-serif;font-size:15px;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.header-strip{position:fixed;top:0;left:0;right:0;height:4px;background:var(--primary);}
.card{background:var(--white);border:1px solid var(--border);box-shadow:var(--shadow-lg);max-width:480px;width:100%;padding:36px 30px;}
.logo-row{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.logo-shield{width:34px;height:34px;flex-shrink:0;}
.brand{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--dark);letter-spacing:.5px;}
.brand em{color:var(--primary);font-style:italic;}
.subtitle{font-size:12px;color:var(--muted);margin-bottom:26px;letter-spacing:.3px;}
.form-group{margin-bottom:16px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
label{display:block;font-size:10px;font-weight:600;letter-spacing:1.3px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
input,select,textarea{width:100%;border:1px solid var(--border);padding:11px 13px;font-family:'Jost',sans-serif;font-size:14px;color:var(--text);background:var(--cream);outline:none;transition:border-color .2s;}
input:focus,select:focus,textarea:focus{border-color:var(--gold2);background:var(--white);}
textarea{resize:vertical;min-height:70px;}
.btn{width:100%;padding:14px;font-family:'Jost',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;border:none;cursor:pointer;transition:opacity .2s;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{opacity:.92;}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.success-box{text-align:center;padding:20px 0;}
.success-icon{font-size:40px;margin-bottom:12px;}
.success-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--green);margin-bottom:8px;}
.success-text{font-size:13px;color:var(--muted);line-height:1.6;}
.error-text{font-size:12px;color:var(--red);margin-top:8px;display:none;}
.note{font-size:11px;color:var(--muted);margin-top:18px;text-align:center;line-height:1.5;}
/* Honeypot — botlar için tuzak alan, gerçek kullanıcılar görmez */
.hp{position:absolute;left:-9999px;top:-9999px;opacity:0;height:0;overflow:hidden;}
@media(max-width:480px){.form-row{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="header-strip"></div>
<div class="card">
  <div id="formWrap">
    <div class="logo-row">
      <svg class="logo-shield" viewBox="0 0 30 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M15 1L28 6V16C28 24 22 30 15 33C8 30 2 24 2 16V6L15 1Z" fill="#C8102E" stroke="#1a1d23" stroke-width="1"/>
        <text x="15" y="20" font-family="Cormorant Garamond, serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">SH</text>
      </svg>
      <div class="brand">SWISS <em>HOUSE</em></div>
    </div>
    <div class="subtitle">Rezervasyon talebinizi iletin, en kısa sürede size dönüş yapacağız.</div>

    <form id="talepForm" autocomplete="off">
      <!-- Honeypot alanı: botlar genelde bu tip alanları otomatik doldurur, insanlar görmez -->
      <div class="hp"><label>Web Sitesi</label><input type="text" id="hp_website" name="website" tabindex="-1" autocomplete="off"></div>

      <div class="form-group">
        <label>Ad Soyad *</label>
        <input type="text" id="t_ad" placeholder="Ad Soyad" required maxlength="80">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Telefon *</label>
          <input type="tel" id="t_tel" placeholder="05XX XXX XX XX" required maxlength="20">
        </div>
        <div class="form-group">
          <label>Instagram Kullanıcı Adı</label>
          <input type="text" id="t_instagram" placeholder="@kullaniciadi" maxlength="40">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Giriş Tarihi *</label>
          <input type="date" id="t_giris" required>
        </div>
        <div class="form-group">
          <label>Çıkış Tarihi *</label>
          <input type="date" id="t_cikis" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Yetişkin Sayısı</label>
          <input type="number" id="t_yetiskin" min="1" value="2">
        </div>
        <div class="form-group">
          <label>Çocuk Sayısı</label>
          <input type="number" id="t_cocuk" min="0" value="0">
        </div>
      </div>
      <div class="form-group">
        <label>Not <span style="font-weight:400;text-transform:none;font-size:10px">(özel istek, oda tercihi vb.)</span></label>
        <textarea id="t_not" maxlength="300" placeholder="İsteğe bağlı..."></textarea>
      </div>

      <button type="submit" class="btn btn-primary" id="gonderBtn">Talebi Gönder</button>
      <div class="error-text" id="errorText"></div>
    </form>

    <div class="note">Bu bir ön talep formudur. Rezervasyonunuz, ekibimiz tarafından onaylandıktan sonra kesinleşir.</div>
  </div>

  <div id="successWrap" style="display:none">
    <div class="success-box">
      <div class="success-icon">✅</div>
      <div class="success-title">Talebiniz Alındı</div>
      <div class="success-text">Rezervasyon talebiniz başarıyla iletildi. Ekibimiz en kısa sürede sizinle iletişime geçecek.</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check.js";
import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDd1m3Az_JKKF__73dLj3mPA9Y5HOJw9mQ",
  authDomain:"swiss-hotel-64451.firebaseapp.com",
  projectId:"swiss-hotel-64451",
  storageBucket:"swiss-hotel-64451.firebasestorage.app",
  messagingSenderId:"1051421740248",
  appId:"1:1051421740248:web:1aba5dbdda28f1b35d1bad"
});

// ── FIREBASE APP CHECK ──
// AŞAĞIDAKİ 'BURAYA_RECAPTCHA_SITE_KEY' KISMINI Firebase konsolundan aldığın
// gerçek reCAPTCHA v3 site key ile değiştir. Bu key gizli değildir, herkese açıktır.
const RECAPTCHA_SITE_KEY = "6LcRbiYtAAAAAIGKlktUMuX-RYyIe1BpZxS7ycen";
if(RECAPTCHA_SITE_KEY !== "BURAYA_RECAPTCHA_SITE_KEY") {
  initializeAppCheck(app, {
    provider: new ReCaptchaV3Provider(RECAPTCHA_SITE_KEY),
    isTokenAutoRefreshEnabled: true
  });
}

const db = getFirestore(app);

const today = () => new Date().toISOString().slice(0,10);
document.getElementById('t_giris').min = today();
document.getElementById('t_cikis').min = today();
document.getElementById('t_giris').addEventListener('change', () => {
  document.getElementById('t_cikis').min = document.getElementById('t_giris').value;
});

// Sayfa yüklenme zamanı — bot tespiti için (botlar formu genelde saniyeler içinde, çok hızlı doldurur)
const sayfaYuklenmeZamani = Date.now();

// Basit istemci-taraflı rate limit: aynı tarayıcıdan kısa sürede tekrar gönderimi engelle
const SON_GONDERIM_KEY = 'swisshouse_son_talep_zamani';
function rateLimitKontrol() {
  try {
    const son = localStorage.getItem(SON_GONDERIM_KEY);
    if(son && (Date.now() - Number(son)) < 60000) return false; // 60 saniye içinde tekrar gönderim yok
    return true;
  } catch(e) { return true; } // localStorage erişilemezse engelleme
}
function rateLimitKaydet() {
  try { localStorage.setItem(SON_GONDERIM_KEY, String(Date.now())); } catch(e) {}
}

document.getElementById('talepForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('errorText');
  errEl.style.display = 'none';
  const btn = document.getElementById('gonderBtn');

  // 1) Honeypot kontrolü — bu alan doluysa bot demektir, sessizce reddet
  if(document.getElementById('hp_website').value.trim() !== '') {
    return; // bot — hiçbir şey söylemeden çık (gerçek bot bunun farkına bile varmaz)
  }

  // 2) Çok hızlı gönderim kontrolü — insan bu formu 3 saniyeden kısa sürede dolduramaz
  if(Date.now() - sayfaYuklenmeZamani < 3000) {
    errEl.textContent = 'Lütfen formu doldurduktan sonra gönderin.';
    errEl.style.display = 'block';
    return;
  }

  // 3) Tarayıcı bazlı rate limit
  if(!rateLimitKontrol()) {
    errEl.textContent = 'Az önce bir talep gönderdiniz. Lütfen biraz bekleyip tekrar deneyin.';
    errEl.style.display = 'block';
    return;
  }

  const ad = document.getElementById('t_ad').value.trim();
  const tel = document.getElementById('t_tel').value.trim();
  const instagram = document.getElementById('t_instagram').value.trim();
  const giris = document.getElementById('t_giris').value;
  const cikis = document.getElementById('t_cikis').value;
  const yetiskin = parseInt(document.getElementById('t_yetiskin').value) || 1;
  const cocuk = parseInt(document.getElementById('t_cocuk').value) || 0;
  const not_ = document.getElementById('t_not').value.trim();

  if(!ad || !tel || !giris || !cikis) {
    errEl.textContent = 'Lütfen zorunlu alanları doldurun.';
    errEl.style.display = 'block';
    return;
  }
  if(cikis <= giris) {
    errEl.textContent = 'Çıkış tarihi, giriş tarihinden sonra olmalıdır.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Gönderiliyor...';

  try {
    await addDoc(collection(db, 'rezervasyon_talepleri'), {
      misafir: ad, tel, instagram: instagram || null,
      giris, cikis, yetiskin, cocuk,
      not: not_ || null,
      kaynak: 'instagram',
      durum: 'bekliyor', // bekliyor | onaylandi | reddedildi
      kayitTarih: new Date().toISOString()
    });
    rateLimitKaydet();
    document.getElementById('formWrap').style.display = 'none';
    document.getElementById('successWrap').style.display = 'block';
  } catch(err) {
    errEl.textContent = 'Bir hata oluştu, lütfen tekrar deneyin veya bizi doğrudan arayın.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Talebi Gönder';
  }
});
</script>
</body>
</html>
