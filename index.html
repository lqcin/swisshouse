<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0e0c">
<title>Swiss Hotel — Giriş</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}

body {
  background:#0f0e0c;
  font-family:'Jost',sans-serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  position:relative;
}

/* Arka plan doku */
body::before {
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 50%, rgba(154,124,63,.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 50%, rgba(30,27,23,.8) 0%, transparent 70%);
  pointer-events:none;
}

body::after {
  content:'';
  position:fixed;inset:0;
  background-image: repeating-linear-gradient(
    0deg, transparent, transparent 40px,
    rgba(196,165,90,.03) 40px, rgba(196,165,90,.03) 41px
  ),
  repeating-linear-gradient(
    90deg, transparent, transparent 40px,
    rgba(196,165,90,.03) 40px, rgba(196,165,90,.03) 41px
  );
  pointer-events:none;
}

/* Sol dekoratif çizgi */
.side-line {
  position:fixed;left:32px;top:0;bottom:0;
  width:1px;
  background:linear-gradient(to bottom, transparent, rgba(196,165,90,.3), transparent);
  display:none;
}
@media(min-width:768px){.side-line{display:block;}}

/* Sağ dekoratif çizgi */
.side-line-right {
  position:fixed;right:32px;top:0;bottom:0;
  width:1px;
  background:linear-gradient(to bottom, transparent, rgba(196,165,90,.15), transparent);
  display:none;
}
@media(min-width:768px){.side-line-right{display:block;}}

/* Ana kart */
.login-wrap {
  position:relative;z-index:10;
  width:100%;max-width:420px;
  padding:24px;
  animation:fadeUp .8s ease both;
}
@keyframes fadeUp {
  from{opacity:0;transform:translateY(24px);}
  to{opacity:1;transform:translateY(0);}
}

/* Logo bölümü */
.logo-section {
  text-align:center;
  margin-bottom:48px;
}

.logo-emblem {
  display:inline-flex;align-items:center;justify-content:center;
  width:56px;height:56px;
  border:1px solid rgba(196,165,90,.4);
  color:rgba(196,165,90,.8);
  font-size:22px;
  margin-bottom:20px;
  position:relative;
}
.logo-emblem::before,
.logo-emblem::after {
  content:'';position:absolute;
  width:6px;height:6px;
  border:1px solid rgba(196,165,90,.3);
}
.logo-emblem::before{top:-3px;left:-3px;}
.logo-emblem::after{bottom:-3px;right:-3px;}

.hotel-name {
  font-family:'Cormorant Garamond',serif;
  font-size:32px;font-weight:300;
  color:#f0ebe0;
  letter-spacing:8px;
  text-transform:uppercase;
  display:block;
  margin-bottom:6px;
}

.hotel-sub {
  font-size:10px;font-weight:400;
  letter-spacing:4px;
  color:rgba(196,165,90,.6);
  text-transform:uppercase;
}

/* Form */
.form-label {
  display:block;
  font-size:10px;font-weight:500;
  letter-spacing:2.5px;text-transform:uppercase;
  color:rgba(240,235,224,.35);
  margin-bottom:10px;
}

.form-input {
  width:100%;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(196,165,90,.15);
  border-bottom-color:rgba(196,165,90,.3);
  padding:14px 0;
  font-family:'Jost',sans-serif;
  font-size:16px;font-weight:300;
  color:#f0ebe0;
  outline:none;
  transition:all .3s;
  margin-bottom:28px;
  letter-spacing:.5px;
  border-radius:0;
  -webkit-appearance:none;
}
.form-input:focus {
  border-color:rgba(196,165,90,.6);
  background:rgba(196,165,90,.04);
  padding-left:12px;
}
.form-input::placeholder{color:rgba(240,235,224,.2);}

.login-btn {
  width:100%;
  background:transparent;
  border:1px solid rgba(196,165,90,.4);
  color:rgba(196,165,90,.9);
  padding:16px;
  font-family:'Jost',sans-serif;
  font-size:11px;font-weight:500;
  letter-spacing:3px;text-transform:uppercase;
  cursor:pointer;
  transition:all .3s;
  position:relative;
  overflow:hidden;
}
.login-btn::before {
  content:'';
  position:absolute;inset:0;
  background:rgba(196,165,90,.08);
  transform:scaleX(0);transform-origin:left;
  transition:transform .3s ease;
}
.login-btn:hover::before{transform:scaleX(1);}
.login-btn:hover{border-color:rgba(196,165,90,.7);}
.login-btn:active{transform:scale(.98);}
.login-btn:disabled{opacity:.4;cursor:not-allowed;}

.error-msg {
  text-align:center;
  color:rgba(220,80,80,.8);
  font-size:12px;
  letter-spacing:.5px;
  margin-top:16px;
  min-height:18px;
  transition:opacity .3s;
}

/* Loading state */
.loading-dots {
  display:none;
  justify-content:center;gap:6px;
  margin-top:24px;
}
.loading-dots span {
  width:4px;height:4px;border-radius:50%;
  background:rgba(196,165,90,.5);
  animation:dot .8s infinite alternate;
}
.loading-dots span:nth-child(2){animation-delay:.2s;}
.loading-dots span:nth-child(3){animation-delay:.4s;}
@keyframes dot{from{opacity:.3;}to{opacity:1;}}

/* Alt bilgi */
.footer-note {
  text-align:center;
  margin-top:48px;
  font-size:10px;
  letter-spacing:2px;
  color:rgba(240,235,224,.12);
  text-transform:uppercase;
}

/* Köşe süsü */
.corner-tl,.corner-br {
  position:fixed;
  width:40px;height:40px;
  display:none;
}
.corner-tl{top:24px;left:24px;border-top:1px solid rgba(196,165,90,.2);border-left:1px solid rgba(196,165,90,.2);}
.corner-br{bottom:24px;right:24px;border-bottom:1px solid rgba(196,165,90,.2);border-right:1px solid rgba(196,165,90,.2);}
@media(min-width:768px){.corner-tl,.corner-br{display:block;}}
</style>
</head>
<body>

<div class="side-line"></div>
<div class="side-line-right"></div>
<div class="corner-tl"></div>
<div class="corner-br"></div>

<div class="login-wrap">
  <div class="logo-section">
    <div class="logo-emblem">✦</div>
    <span class="hotel-name">Swiss</span>
    <span class="hotel-sub">Hotel &amp; Suites · Yönetim</span>
  </div>

  <label class="form-label">E-posta Adresi</label>
  <input class="form-input" type="email" id="emailInput"
    placeholder="kullanici@swisshotel.com"
    autocomplete="email"
    onkeydown="if(event.key==='Enter')doLogin()">

  <label class="form-label">Şifre</label>
  <input class="form-input" type="password" id="passInput"
    placeholder="••••••••"
    autocomplete="current-password"
    onkeydown="if(event.key==='Enter')doLogin()">

  <button class="login-btn" id="loginBtn" onclick="doLogin()">
    Sisteme Giriş
  </button>

  <div class="error-msg" id="errorMsg"></div>

  <div class="loading-dots" id="loadingDots">
    <span></span><span></span><span></span>
  </div>

  <div class="footer-note">Swiss Hotel · Yönetim Sistemi</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyDd1m3Az_JKKF__73dLj3mPA9Y5HOJw9mQ",
  authDomain:"swiss-hotel-64451.firebaseapp.com",
  projectId:"swiss-hotel-64451",
  storageBucket:"swiss-hotel-64451.firebasestorage.app",
  messagingSenderId:"1051421740248",
  appId:"1:1051421740248:web:1aba5dbdda28f1b35d1bad"
});
const auth = getAuth(app);

// Rol haritası
const ROLES = {
  'yonetici@swisshotel.com': 'yonetici',
  'resepsiyon@swisshotel.com': 'resepsiyon'
};

// Zaten giriş yapmışsa yönlendir
onAuthStateChanged(auth, user => {
  if (user) yonlendir(user.email);
});

function yonlendir(email) {
  const rol = ROLES[email] || 'resepsiyon';
  if (rol === 'yonetici') {
    window.location.href = 'yonetici.html';
  } else {
    window.location.href = 'resepsiyon.html';
  }
}

window.doLogin = async function() {
  const email = document.getElementById('emailInput').value.trim();
  const pass  = document.getElementById('passInput').value;
  const errEl = document.getElementById('errorMsg');
  const btn   = document.getElementById('loginBtn');
  const dots  = document.getElementById('loadingDots');

  errEl.textContent = '';

  if (!email || !pass) {
    errEl.textContent = 'E-posta ve şifre giriniz.';
    return;
  }

  // Loading
  btn.disabled = true;
  btn.textContent = '...';
  dots.style.display = 'flex';

  try {
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    yonlendir(cred.user.email);
  } catch(e) {
    dots.style.display = 'none';
    btn.disabled = false;
    btn.textContent = 'Sisteme Giriş';
    errEl.textContent = 'E-posta veya şifre hatalı.';
  }
};
</script>
</body>
</html>
